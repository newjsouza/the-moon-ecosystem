name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install ruff bandit safety

      - name: Run Ruff (lint)
        run: ruff check .

      - name: Run Ruff (type check)
        run: ruff check --select I .

      - name: Run Bandit (security)
        run: bandit -r . -x ./Super-Agente/mcp-servers,./Super-Agente/skills

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests
        run: pytest --cov=. --cov-report=xml --cov-report=term-missing
        env:
          SUPABASE_URL: http://localhost:54321
          SUPABASE_ANON_KEY: test_key
          GROQ_API_KEY: test_key
          OPENAI_API_KEY: test_key
          ANTHROPIC_API_KEY: test_key

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install pip-audit safety

      - name: Install project dependencies
        run: |
          pip install -q groq openai anthropic supabase playwright

      - name: Run pip-audit
        run: pip-audit || true

      - name: Run safety check
        run: safety check || true

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Supabase stack
        run: |
          cd infrastructure
          docker-compose build --no-cache

      - name: Verify containers
        run: |
          cd infrastructure
          docker-compose up -d
          sleep 10
          docker-compose ps

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [lint, test, security-audit, docker-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploy triggered - add your deployment logic here"
          echo "This could be: Kamal, Docker Hub, Railway, Render, etc."
