# ═══════════════════════════════════════════════════
#  🌕 The Moon Ecosystem — CI Pipeline
# ═══════════════════════════════════════════════════
#  Quality Gate: Lint + Security + Tests + Import Check
#  MOON_CODEX Directive 0.2: Zero Cost Policy enforced
#  
#  TEST CATEGORIES:
#  - Unit tests: Always run (no external dependencies)
#  - Integration tests: Run only when secrets are configured
#  - Secrets: GROQ_API_KEY, TELEGRAM_BOT_TOKEN, GITHUB_TOKEN
# ═══════════════════════════════════════════════════

name: 🌕 The Moon — CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# Cancela runs anteriores se novo commit for pushado
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Check if secrets are configured (for conditional test execution)
  HAS_GROQ: ${{ secrets.GROQ_API_KEY != '' && secrets.GROQ_API_KEY != 'COLE_O_SEU_TOKEN_AQUI' }}
  HAS_TELEGRAM: ${{ secrets.TELEGRAM_BOT_TOKEN != '' }}
  HAS_GITHUB: ${{ secrets.GITHUB_TOKEN != '' }}

jobs:
  # ───────────────────────────────────────────────────────────
  #  Quality Gate Principal
  # ───────────────────────────────────────────────────────────
  quality-gate:
    name: Quality Gate (Lint + Security + Tests)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          echo "✅ Dependencies installed"

      - name: 🔍 Lint (Ruff)
        run: |
          ruff check . --output-format=github --show-source
          echo "✅ Ruff passed"

      - name: 🔒 Security Scan (Bandit)
        run: |
          bandit -r agents/ core/ utils/ -ll --exit-zero -f json -o bandit-report.json || true
          bandit -r agents/ core/ utils/ -ll
          echo "✅ Bandit security scan completed"

      - name: 🧪 Unit Tests (Always Run)
        run: |
          echo "Running unit tests (no external dependencies)..."
          pytest tests/ -v \
            -m "not requires_groq and not requires_telegram and not requires_github and not requires_gemini and not requires_openrouter and not requires_alpha_vantage" \
            --cov=agents \
            --cov=core \
            --cov=utils \
            --cov=channels \
            --cov=skills \
            --cov-report=term-missing \
            --cov-fail-under=25 \
            --timeout=60 \
            --tb=short \
            -q
        env:
          # No secrets needed for unit tests
          PYTHONPATH: ${{ github.workspace }}

      - name: 🧪 Integration Tests (When Secrets Available)
        if: env.HAS_GROQ == 'true' || env.HAS_TELEGRAM == 'true' || env.HAS_GITHUB == 'true'
        run: |
          echo "Running integration tests (secrets configured)..."
          pytest tests/ -v \
            -m "requires_groq or requires_telegram or requires_github or requires_gemini or requires_openrouter or requires_alpha_vantage" \
            --timeout=120 \
            --tb=short \
            -q
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}

      - name: ⚠️ Integration Tests Skipped (No Secrets)
        if: env.HAS_GROQ != 'true' && env.HAS_TELEGRAM != 'true' && env.HAS_GITHUB != 'true'
        run: |
          echo "⚠️ Integration tests skipped: No secrets configured"
          echo "To run integration tests, configure secrets in GitHub Settings → Secrets and variables → Actions"
          echo ""
          echo "Required secrets:"
          echo "  - GROQ_API_KEY (primary LLM provider)"
          echo "  - TELEGRAM_BOT_TOKEN (Telegram bot)"
          echo "  - GITHUB_TOKEN (GitHub API access)"
          echo ""
          echo "Optional secrets:"
          echo "  - GEMINI_API_KEY (fallback LLM)"
          echo "  - OPENROUTER_API_KEY (tertiary LLM)"
          echo "  - ALPHA_VANTAGE_API_KEY (financial data)"

      - name: 📊 Coverage Report
        if: always()
        run: |
          coverage xml
          coverage html
          echo "✅ Coverage report generated"

      - name: 📤 Upload Coverage Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

      - name: 📤 Upload Bandit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 7

  # ───────────────────────────────────────────────────────────
  #  Import Sanity Check
  # ───────────────────────────────────────────────────────────
  import-check:
    name: Import Sanity Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: 📦 Install base dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install feedparser

      - name: ✅ Verify all agent imports
        run: |
          echo "Testing agent imports..."

          python3 -c "from agents.architect import ArchitectAgent; print('✅ ArchitectAgent OK')"
          python3 -c "from agents.watchdog import WatchdogAgent; print('✅ WatchdogAgent OK')"
          python3 -c "from agents.news_monitor import NewsMonitorAgent; print('✅ NewsMonitorAgent OK')"
          python3 -c "from agents.crawler import CrawlerAgent; print('✅ CrawlerAgent OK')"
          python3 -c "from agents.economic_sentinel import EconomicSentinel; print('✅ EconomicSentinel OK')"
          python3 -c "from agents.nexus_intelligence import NexusIntelligence; print('✅ NexusIntelligence OK')"
          python3 -c "from agents.llm import LLMRouter, LlmAgent; print('✅ LLMRouter OK')"
          python3 -c "from agents.omni_channel_strategist import OmniChannelStrategist; print('✅ OmniChannelStrategist OK')"
          python3 -c "from agents.autonomous_devops_refactor import AutonomousDevOpsRefactor; print('✅ AutonomousDevOpsRefactor OK')"
          python3 -c "from agents.semantic_memory_weaver import SemanticMemoryWeaver; print('✅ SemanticMemoryWeaver OK')"
          python3 -c "from agents.skill_alchemist import SkillAlchemist; print('✅ SkillAlchemist OK')"
          python3 -c "from agents.github_agent import GithubAgent; print('✅ GithubAgent OK')"
          python3 -c "from agents.hardware_synergy_bridge import HardwareSynergyBridge; print('✅ HardwareSynergyBridge OK')"

          echo ""
          echo "🎉 Todos os imports OK!"

  # ───────────────────────────────────────────────────────────
  #  Code Formatting Check
  # ───────────────────────────────────────────────────────────
  format-check:
    name: Code Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: 📦 Install ruff
        run: pip install ruff

      - name: 🔍 Check formatting
        run: |
          ruff format --check agents/ core/ utils/ tests/
          echo "✅ Code formatting OK"

  # ───────────────────────────────────────────────────────────
  #  MOON_CODEX Compliance Check
  # ───────────────────────────────────────────────────────────
  codex-check:
    name: MOON_CODEX Compliance
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 🔍 Check for paid model references
        run: |
          echo "Checking for paid model references (MOON_CODEX Directive 0.2)..."

          # Procura por modelos pagos em código Python
          if grep -rn "gpt-4\|gpt-3.5-turbo\|claude-3-opus\|claude-3-sonnet" --include="*.py" agents/ core/ utils/; then
            echo "❌ Paid model references found!"
            exit 1
          fi

          echo "✅ No paid model references found"

      - name: 🔍 Check for print() in production code
        run: |
          echo "Checking for print() statements in production code..."

          # Ignora testes e scripts de utilidade
          if grep -rn "^print(" --include="*.py" agents/ core/ | grep -v "test_" | grep -v "__pycache__"; then
            echo "❌ print() statements found in production code!"
            exit 1
          fi

          echo "✅ No print() in production code"

  # ───────────────────────────────────────────────────────────
  #  Secrets Configuration Guide (Documentation Job)
  # ───────────────────────────────────────────────────────────
  secrets-guide:
    name: Secrets Configuration Guide
    runs-on: ubuntu-latest
    steps:
      - name: 📖 Secrets Setup Documentation
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "  🌕 THE MOON — GitHub Secrets Configuration Guide"
          echo "═══════════════════════════════════════════════════"
          echo ""
          echo "📍 ONDE CONFIGURAR:"
          echo "   GitHub → Seu Repositório → Settings → Secrets and variables → Actions"
          echo ""
          echo "🔑 SECRETS OBRIGATÓRIOS:"
          echo ""
          echo "   1. GROQ_API_KEY"
          echo "      - Obter em: https://console.groq.com/keys"
          echo "      - Finalidade: LLM primário (llama-3.3-70b, llama-3.1-8b)"
          echo "      - Custo: Free tier (2-5 req/seg)"
          echo ""
          echo "   2. TELEGRAM_BOT_TOKEN"
          echo "      - Obter em: @BotFather no Telegram"
          echo "      - Finalidade: Bot de comunicação do ecossistema"
          echo "      - Custo: Gratuito"
          echo ""
          echo "   3. GITHUB_TOKEN"
          echo "      - Gerar em: GitHub Settings → Developer settings → Personal access tokens"
          echo "      - Escopos: repo, workflow"
          echo "      - Finalidade: GithubAgent para automação de repositórios"
          echo "      - Custo: Gratuito"
          echo ""
          echo "🔑 SECRETS OPCIONAIS (Fallback):"
          echo ""
          echo "   4. GEMINI_API_KEY"
          echo "      - Obter em: https://makersuite.google.com/app/apikey"
          echo "      - Finalidade: Fallback secundário (gemini-2.0-flash)"
          echo "      - Custo: Free tier (15 req/min)"
          echo ""
          echo "   5. OPENROUTER_API_KEY"
          echo "      - Obter em: https://openrouter.ai/keys"
          echo "      - Finalidade: Fallback terciário (modelos open-source)"
          echo "      - Custo: Free tier disponível"
          echo ""
          echo "   6. ALPHA_VANTAGE_API_KEY"
          echo "      - Obter em: https://www.alphavantage.co/support/#api-key"
          echo "      - Finalidade: EconomicSentinel (dados financeiros)"
          echo "      - Custo: Free tier (5 req/min, 500 req/dia)"
          echo ""
          echo "⚠️ IMPORTANTE:"
          echo "   - NUNCA commite arquivos .env com chaves reais"
          echo "   - Use .env.example como template"
          echo "   - Secrets do GitHub são criptografados e injetados apenas no CI"
          echo ""
          echo "🧪 VALIDAÇÃO LOCAL:"
          echo "   # Copie .env.example para .env"
          echo "   cp .env.example .env"
          echo ""
          echo "   # Edite .env com suas chaves"
          echo "   nano .env"
          echo ""
          echo "   # Rode testes unitários (sem secrets)"
          echo "   pytest tests/ -m 'not requires_groq and not requires_telegram'"
          echo ""
          echo "   # Rode testes com secrets (se configurados)"
          echo "   pytest tests/ -v"
          echo ""
          echo "═══════════════════════════════════════════════════"
