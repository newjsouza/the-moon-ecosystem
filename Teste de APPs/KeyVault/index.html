    <style>
      /* Neon Scanner Animation */
      #neon-scanner {
        position: fixed; top: 0; left: 0; width: 100%; height: 2px;
        background: linear-gradient(90deg, transparent, #00f2fe, #4facfe, transparent);
        z-index: 9999; display: none; pointer-events: none;
        box-shadow: 0 0 15px #4facfe, 0 0 30px #00f2fe;
        animation: scan 2s linear infinite;
      }
      @keyframes scan {
        0% { transform: translateY(-10px); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translateY(100vh); opacity: 0; }
      }
      .searching #neon-scanner { display: block; }
    </style>

  <body>
    <div id="neon-scanner"></div>
    <div id="root"></div>
    <script>
      // Monitor de Busca para Ativar Animação
      document.addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if (btn && (btn.innerText.includes('Buscar') || btn.innerText.includes('Search'))) {
          document.body.classList.add('searching');
          console.log('🔍 Busca Iniciada...');
          
          // Auto-stop após 5 segundos ou quando detectar mudança no DOM (resultados)
          const timeout = setTimeout(() => {
            document.body.classList.remove('searching');
          }, 5000);

          const observer = new MutationObserver(() => {
            if (document.querySelectorAll('.grid > div').length > 5) {
              document.body.classList.remove('searching');
              observer.disconnect();
              clearTimeout(timeout);
            }
          });
          observer.observe(document.body, { childList: true, subtree: true });
        }
      });
    </script>
  </body>
